# brickpick/config/arm_presets.yaml
brickpick_arm_preset:
  ros__parameters:
    
    # ===== 动作预设（单位：米，相对于 arm_base_link） =====
    presets.home.x: 0
    presets.home.z: 0

    presets.forward.x: 0
    presets.forward.z: 0

    presets.down.x: 0
    presets.down.z: 0

    presets.backward.x: 0
    presets.backward.z: 0
    
    
    
    # ===== 运动参数 =====
    # default_speed: 0.25             # 默认速度 (0.1~0.5)，值越小越平稳
    use_relative: true             # 默认使用绝对坐标（推荐）
    goal_timeout: 5.0               # 单个动作最大等待时间（秒）
    
    # ===== 安全限制 =====
    position_limits.x.min: 0
    position_limits.x.max: 0.22
    position_limits.z.min: 0
    position_limits.z.max: 0.15

    emergency_stop_on_error: true   # 动作失败时是否自动回 home
    
    # ===== 执行序列（可自定义顺序） =====
    default_sequence: ["home", "forward", "down", "backward", "home"]